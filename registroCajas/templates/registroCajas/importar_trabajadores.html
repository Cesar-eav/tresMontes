{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Trabajadores - Tres Montes</title>
    <link rel="stylesheet" href="{% static 'css/panel.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .import-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .btn-submit {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .btn-cancel {
            background-color: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
            display: block;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1>Importar Trabajadores</h1>
            <div class="user-icon">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="import-container">
            <h2>Subir archivo CSV</h2>
            <p>El archivo debe tener las columnas: RUT, NOMBRES, APELLIDOS, CARGO, TIPO DE CONTRATO, PERIODO, SEDE,
                ESTADO</p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-upload"></i> Importar
                </button>
                <a href="{% url 'panel_principal' %}" class="btn-cancel">Cancelar</a>
            </form>
        </div>
    </main>
</body>

</html>
